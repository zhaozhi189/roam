    <line x1="450" y1="660" x2="450" y2="728" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
    <line x1="862" y1="480" x2="898" y2="480" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-gray)"/>
