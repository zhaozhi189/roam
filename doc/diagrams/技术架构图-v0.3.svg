    <text x="450" y="756" text-anchor="middle" font-size="15" font-weight="700" fill="#14532d">💬 微信 (用户在系统面板选)</text>
    <text x="450" y="778" text-anchor="middle" font-size="11" fill="#166534">发给朋友 / 朋友圈 → 接收方看视频</text>
  </g>
