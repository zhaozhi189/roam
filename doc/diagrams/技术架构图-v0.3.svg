    <line x1="420" y1="556" x2="638" y2="556" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="3,2"/>
    <line x1="730" y1="510" x2="730" y2="408" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <rect x="700" y="450" width="60" height="20" fill="#faf5ff" opacity="0.95"/>
