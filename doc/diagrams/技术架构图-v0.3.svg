    <text x="1035" y="484" text-anchor="middle" font-size="10" fill="#6b7280">❌ MVP 不启用</text>
    <rect x="920" y="504" width="230" height="48" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="1035" y="524" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Pages (前端部署)</text>
    <text x="1035" y="542" text-anchor="middle" font-size="10" fill="#6b7280">❌ MVP 不启用</text>
    <rect x="920" y="562" width="230" height="48" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="1035" y="582" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Workers (后端 API)</text>
    <text x="1035" y="600" text-anchor="middle" font-size="10" fill="#6b7280">❌ MVP 不启用</text>
    <rect x="920" y="620" width="230" height="48" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
    <text x="1035" y="640" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">D1 (SQLite)</text>
    <text x="1035" y="658" text-anchor="middle" font-size="10" fill="#6b7280">❌ MVP 不启用</text>
    <text x="1035" y="685" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">M3-M4 视情况启用</text>
  </g>
