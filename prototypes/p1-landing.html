<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roam · 落地页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 800px 600px at 10% 0%, rgba(139,92,246,0.18), transparent 60%),
        radial-gradient(ellipse 700px 500px at 90% 20%, rgba(59,130,246,0.14), transparent 60%),
        radial-gradient(ellipse 600px 400px at 50% 100%, rgba(6,182,212,0.10), transparent 60%),
        #FAFAFC;
      min-height: 100vh; color: #1A1A2E;
    }
    .glass { background: rgba(255,255,255,0.65); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 8px 32px rgba(139,92,246,0.08), 0 1px 2px rgba(0,0,0,0.04); }
    .glass-strong { background: rgba(255,255,255,0.85); backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%); border: 1px solid rgba(255,255,255,0.95); box-shadow: 0 16px 48px rgba(139,92,246,0.12), 0 2px 4px rgba(0,0,0,0.04); }
    .glass-card { transition: all 220ms cubic-bezier(0.16, 1, 0.3, 1); }
    .glass-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(139,92,246,0.18); }
    .btn-primary { background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%); color: white; box-shadow: 0 8px 24px rgba(139,92,246,0.30), inset 0 1px 0 rgba(255,255,255,0.25); transition: all 200ms ease-out; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(139,92,246,0.40); }
    .btn-secondary { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); color: #1A1A2E; border: 1px solid rgba(26,26,46,0.10); transition: all 200ms ease-out; }
    .btn-secondary:hover { background: rgba(255,255,255,0.95); transform: translateY(-1px); }
    .canvas-ph { background:
      repeating-linear-gradient(45deg, rgba(139,92,246,0.04) 0 10px, transparent 10px 20px),
      linear-gradient(135deg, #F4F0FF, #FDF2F8);
      border: 1px dashed rgba(139,92,246,0.25); }
    .gradient-text { background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 50%, #06B6D4 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>
  <!-- Top nav -->
  <nav class="glass sticky top-3 z-50 mx-3 md:mx-6 mt-3 px-5 py-3 flex items-center justify-between rounded-2xl">
    <a href="index.html" class="flex items-center gap-2">
      <span class="text-xl">🚶</span><span class="font-semibold tracking-tight">Roam</span>
    </a>
    <div class="flex items-center gap-2">
      <a href="p6-help.html" class="text-sm text-[#52525B] hover:text-[#1A1A2E] px-3 py-2">如何制作</a>
      <button class="btn-primary text-sm font-medium px-4 py-2 rounded-xl">下载 Roam APK</button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="px-6 py-20 md:py-32 text-center max-w-4xl mx-auto">
    <div class="inline-flex items-center gap-2 glass rounded-full px-3 py-1.5 text-xs text-[#52525B] mb-8 font-medium">
      <span class="w-1.5 h-1.5 bg-[#06B6D4] rounded-full animate-pulse"></span>
      MVP 早期 · 周末项目
    </div>
    <h1 class="text-4xl sm:text-5xl md:text-7xl font-semibold tracking-tight leading-[1.05] mb-6">
      把你的房间<br/>
      <span class="gradient-text font-bold">变成可漫游的 3D 空间</span>
    </h1>
    <p class="text-base sm:text-lg md:text-xl text-[#52525B] max-w-2xl mx-auto mb-10 leading-relaxed">
      上传 3DGS 文件,在手机里漫游录视频<br/>
      一键分享微信给朋友
    </p>
    <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-center gap-3 max-w-sm sm:max-w-none mx-auto">
      <button class="btn-primary font-medium px-6 py-3.5 rounded-2xl text-base">立即体验示例 →</button>
      <button class="btn-secondary font-medium px-6 py-3.5 rounded-2xl text-base">下载 Roam APK</button>
    </div>
  </section>

  <!-- Examples -->
  <section class="px-6 pb-24 max-w-6xl mx-auto">
    <div class="text-center mb-8">
      <div class="text-xs uppercase tracking-widest text-[#8B5CF6] font-semibold mb-2">官方示例</div>
      <h2 class="text-2xl md:text-3xl font-semibold tracking-tight">先看几个场景</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      <a href="p5-public-view.html" class="glass glass-card rounded-3xl overflow-hidden cursor-pointer">
        <div class="canvas-ph aspect-video flex items-center justify-center text-[#8B5CF6]/40 text-xs font-medium">3D 预览 · 卧室</div>
        <div class="p-5">
          <div class="flex items-center justify-between">
            <div class="text-base font-semibold">卧室</div>
            <div class="text-xs text-[#06B6D4] font-medium bg-[#06B6D4]/10 px-2 py-0.5 rounded-full">推荐</div>
          </div>
          <div class="text-xs text-[#71717A] mt-1.5">12 MB · 体验基本漫游</div>
        </div>
      </a>
      <a href="p5-public-view.html" class="glass glass-card rounded-3xl overflow-hidden cursor-pointer">
        <div class="canvas-ph aspect-video flex items-center justify-center text-[#3B82F6]/40 text-xs font-medium">3D 预览 · 咖啡馆</div>
        <div class="p-5">
          <div class="text-base font-semibold">咖啡馆</div>
          <div class="text-xs text-[#71717A] mt-1.5">22 MB · 复杂光照测试</div>
        </div>
      </a>
      <a href="p5-public-view.html" class="glass glass-card rounded-3xl overflow-hidden cursor-pointer">
        <div class="canvas-ph aspect-video flex items-center justify-center text-[#06B6D4]/50 text-xs font-medium">3D 预览 · 展厅</div>
        <div class="p-5">
          <div class="text-base font-semibold">展厅</div>
          <div class="text-xs text-[#71717A] mt-1.5">18 MB · 大空间漫游</div>
        </div>
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="px-6 py-8 border-t border-black/5 text-sm text-[#71717A]">
    <div class="max-w-6xl mx-auto flex flex-wrap items-center justify-between gap-4">
      <div>© 2026 Roam · 个人项目,无商业化</div>
      <div class="flex items-center gap-5">
        <a href="p6-help.html" class="hover:text-[#1A1A2E]">如何制作</a>
        <a href="#" class="hover:text-[#1A1A2E]">GitHub Repo</a>
        <a href="#" class="hover:text-[#1A1A2E]">隐私协议</a>
      </div>
    </div>
  </footer>
</body>
</html>
