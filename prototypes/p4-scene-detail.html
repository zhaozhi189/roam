<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roam · 场景详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(ellipse 800px 500px at 0% 0%, rgba(139,92,246,0.10), transparent 60%),
        radial-gradient(ellipse 700px 400px at 100% 30%, rgba(59,130,246,0.08), transparent 60%),
        #FAFAFC;
      min-height: 100vh; color: #1A1A2E;
    }
    .glass { background: rgba(255,255,255,0.65); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 8px 32px rgba(139,92,246,0.06), 0 1px 2px rgba(0,0,0,0.03); }
    .glass-modal { background: rgba(255,255,255,0.95); backdrop-filter: blur(28px) saturate(180%); -webkit-backdrop-filter: blur(28px) saturate(180%); border: 1px solid rgba(255,255,255,0.95); box-shadow: 0 20px 60px rgba(239,68,68,0.18), 0 4px 8px rgba(0,0,0,0.04); }
    .btn-cyan { background: linear-gradient(135deg, #06B6D4 0%, #0891B2 100%); color: white; box-shadow: 0 6px 16px rgba(6,182,212,0.30); transition: all 200ms ease-out; }
    .btn-cyan:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(6,182,212,0.40); }
    .canvas-ph { background:
      repeating-linear-gradient(45deg, rgba(139,92,246,0.04) 0 10px, transparent 10px 20px),
      linear-gradient(135deg, #F4F0FF, #FDF2F8);
      border: 1px dashed rgba(139,92,246,0.25); }
  </style>
</head>
<body>
  <!-- Top nav -->
  <nav class="glass sticky top-3 z-50 mx-3 md:mx-6 mt-3 px-5 py-3 flex items-center justify-between rounded-2xl">
    <a href="index.html" class="flex items-center gap-2"><span class="text-xl">🚶</span><span class="font-semibold tracking-tight">Roam</span></a>
    <div class="flex items-center gap-1">
      <a href="p2-dashboard.html" class="text-sm px-3 py-2 rounded-xl text-[#52525B] hover:text-[#1A1A2E] hover:bg-white/60 font-medium">我的场景</a>
      <a href="p6-help.html" class="text-sm px-3 py-2 rounded-xl text-[#52525B] hover:text-[#1A1A2E] hover:bg-white/60">帮助</a>
      <div class="ml-3 flex items-center gap-2 bg-white/70 backdrop-blur-md border border-black/5 rounded-full pl-1 pr-3 py-1 cursor-pointer hover:bg-white">
        <div class="w-7 h-7 rounded-full" style="background: linear-gradient(135deg, #8B5CF6, #3B82F6);"></div>
        <span class="text-sm font-medium">zhi</span>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 pt-8 pb-20">
    <a href="p2-dashboard.html" class="text-sm text-[#71717A] hover:text-[#1A1A2E] inline-flex items-center gap-1 mb-6 font-medium">
      <span>←</span> 返回我的场景
    </a>

    <div class="flex items-start justify-between flex-wrap gap-4 mb-6">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <h1 class="text-3xl font-semibold tracking-tight">卧室</h1>
          <button class="text-[#A1A1AA] hover:text-[#8B5CF6] w-9 h-9 rounded-xl hover:bg-[#8B5CF6]/8 flex items-center justify-center transition" title="改名">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
        <div class="text-sm text-[#71717A] flex items-center gap-2 flex-wrap">
          <span>创建于 2026-05-12</span>
          <span class="text-[#D4D4D8]">·</span>
          <span>12 MB</span>
          <span class="text-[#D4D4D8]">·</span>
          <code class="bg-white/80 border border-black/5 px-1.5 py-0.5 rounded text-xs text-[#52525B]">.sog</code>
        </div>
      </div>
    </div>

    <!-- 3D preview -->
    <div class="canvas-ph rounded-3xl aspect-video mb-6 flex items-center justify-center relative">
      <div class="text-center">
        <div class="text-[#8B5CF6]/60 text-sm font-medium mb-2">3D 漫游画布 · 站位</div>
        <div class="text-[#A1A1AA] text-xs">M0 之后接入 PlayCanvas Engine</div>
      </div>
      <div class="absolute bottom-4 left-4 right-4 flex items-center justify-between text-xs">
        <div class="bg-white/80 backdrop-blur-md border border-black/5 px-3 py-1.5 rounded-full text-[#52525B] font-medium">WASD 移动 · 鼠标拖拽视角</div>
        <button class="bg-white/80 backdrop-blur-md border border-black/5 px-3 py-1.5 rounded-full hover:bg-white text-[#1A1A2E] font-medium">全屏 ⛶</button>
      </div>
    </div>

    <!-- Public link -->
    <div class="glass rounded-3xl p-5 mb-6">
      <div class="text-xs uppercase tracking-widest text-[#8B5CF6] mb-3 font-semibold">公开链接</div>
      <div class="flex flex-col sm:flex-row sm:items-center gap-2">
        <code class="flex-1 min-w-0 bg-white/90 border border-black/8 px-3 py-2.5 rounded-xl text-sm text-[#1A1A2E] font-mono truncate">https://roam.app/s/aB3xY9</code>
        <button class="bg-white border border-black/10 px-3 py-2.5 rounded-xl text-sm font-medium hover:border-[#8B5CF6]/30 hover:bg-[#8B5CF6]/5 transition flex items-center justify-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          复制
        </button>
        <a href="p5-public-view.html" target="_blank" class="btn-cyan px-3 py-2.5 rounded-xl text-sm font-medium flex items-center justify-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          在新标签打开
        </a>
      </div>
      <div class="text-xs text-[#71717A] mt-3">所有场景默认公开,MVP 不支持设为私有</div>
    </div>

    <!-- Toast example -->
    <div class="text-xs text-[#A1A1AA] mb-2">↓ 复制成功后的 Toast</div>
    <div class="inline-flex items-center gap-2 bg-[#1A1A2E] text-white rounded-xl px-3 py-2 text-sm mb-10 shadow-lg">
      <span class="text-[#06B6D4]">✓</span> 已复制到剪贴板
    </div>

    <!-- Danger zone -->
    <div class="border-t border-black/5 pt-8">
      <h2 class="text-xs uppercase tracking-widest text-[#EF4444] mb-4 font-semibold">危险操作</h2>
      <div class="bg-white/65 backdrop-blur-md border border-[#EF4444]/15 rounded-3xl p-5 flex items-center justify-between gap-4 flex-wrap shadow-sm">
        <div>
          <div class="text-base font-semibold mb-1">删除场景</div>
          <div class="text-sm text-[#71717A]">删除后无法恢复,公开链接也会立即失效</div>
        </div>
        <button onclick="document.getElementById('delModal').classList.remove('hidden')" class="bg-[#EF4444]/8 text-[#DC2626] border border-[#EF4444]/20 px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-[#EF4444]/12 transition">
          🗑 删除场景
        </button>
      </div>
    </div>
  </main>

  <!-- Delete confirm modal -->
  <div id="delModal" class="hidden fixed inset-0 flex items-center justify-center px-4 z-50" style="background: rgba(244,240,255,0.55); backdrop-filter: blur(4px);">
    <div class="w-full max-w-md glass-modal rounded-3xl p-6">
      <h3 class="text-lg font-semibold mb-2">确认删除「卧室」?</h3>
      <p class="text-sm text-[#52525B] mb-4">这个操作无法撤销。请输入场景名 <code class="bg-black/5 border border-black/5 px-1.5 py-0.5 rounded text-[#1A1A2E]">卧室</code> 确认删除:</p>
      <input type="text" placeholder="输入场景名" class="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-[#EF4444] focus:ring-2 focus:ring-[#EF4444]/15 mb-5" />
      <div class="flex items-center justify-end gap-2">
        <button onclick="document.getElementById('delModal').classList.add('hidden')" class="text-sm text-[#52525B] hover:text-[#1A1A2E] px-4 py-2 font-medium">取消</button>
        <button class="bg-[#EF4444]/15 text-[#DC2626] border border-[#EF4444]/25 px-4 py-2 rounded-xl text-sm font-medium cursor-not-allowed" disabled>永久删除</button>
      </div>
    </div>
  </div>
</body>
</html>
