<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卧室 · Roam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #050810; color: #F8FAFC; margin: 0; min-height: 100vh;
    }
    .glass { background: rgba(15,23,42,0.55); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); border: 1px solid rgba(255,255,255,0.10); }
    .canvas-ph { background:
      radial-gradient(circle at 30% 40%, rgba(6,182,212,0.10), transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(99,102,241,0.10), transparent 50%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0 10px, transparent 10px 20px),
      linear-gradient(135deg, #1a2440, #0a0f1e);
    }
  </style>
</head>
<body class="overflow-hidden">

  <!-- Full screen 3D canvas placeholder -->
  <div class="canvas-ph fixed inset-0 flex items-center justify-center">
    <div class="text-center">
      <div class="text-white/25 text-base mb-2">3D 漫游画布</div>
      <div class="text-white/15 text-xs">站位 · M0 之后接入 PlayCanvas Engine</div>
    </div>
  </div>

  <!-- Top bar -->
  <header class="fixed top-0 inset-x-0 z-30 p-3 md:p-4">
    <div class="glass rounded-2xl px-4 py-2.5 flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <a href="index.html" class="text-xl shrink-0">🚶</a>
        <div class="min-w-0">
          <div class="text-base font-semibold truncate">卧室</div>
          <div class="text-xs text-white/50 truncate">by @zhi</div>
        </div>
      </div>
      <div class="flex items-center gap-1 shrink-0">
        <button class="hidden md:flex items-center gap-1.5 text-sm text-white/70 hover:text-white px-3 py-1.5 rounded-lg hover:bg-white/10" title="全屏">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          全屏
        </button>
        <button class="text-white/60 hover:text-white w-9 h-9 rounded-lg hover:bg-white/10 flex items-center justify-center text-lg">⋮</button>
      </div>
    </div>
  </header>

  <!-- Loading state (top progress) -->
  <div class="fixed top-20 left-1/2 -translate-x-1/2 z-20">
    <div class="glass rounded-full px-4 py-2 flex items-center gap-3 text-sm">
      <div class="w-3 h-3 border-2 border-white/20 border-t-cyan-400 rounded-full animate-spin"></div>
      <span class="text-white/80">正在加载 12 MB</span>
      <span class="text-white/40 text-xs">62%</span>
    </div>
  </div>

  <!-- Desktop hint (bottom-left) -->
  <div class="hidden md:block fixed bottom-6 left-6 z-30">
    <div class="glass rounded-xl px-4 py-3 text-sm">
      <div class="text-white/70 mb-1">操作指南</div>
      <div class="text-xs text-white/50 space-y-0.5">
        <div><kbd class="bg-white/10 px-1.5 py-0.5 rounded text-[10px] font-mono">WASD</kbd> 移动</div>
        <div><kbd class="bg-white/10 px-1.5 py-0.5 rounded text-[10px] font-mono">鼠标拖</kbd> 视角</div>
      </div>
    </div>
  </div>

  <!-- Mobile virtual joystick (placeholder) -->
  <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-30">
    <div class="glass rounded-full w-24 h-24 flex items-center justify-center relative">
      <div class="absolute inset-3 rounded-full border border-white/15"></div>
      <div class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 shadow-lg"></div>
    </div>
    <div class="text-[10px] text-white/30 text-center mt-2">虚拟摇杆 · 站位</div>
  </div>

  <!-- Bottom brand link -->
  <div class="fixed bottom-6 right-6 z-30">
    <a href="index.html" class="glass rounded-full px-3 py-1.5 text-xs text-white/60 hover:text-white flex items-center gap-1.5">
      <span>🚶</span><span>用 Roam 制作 →</span>
    </a>
  </div>

</body>
</html>
